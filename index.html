<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waranya Uamthong</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #FDF6F9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
    }

    .page {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 28px 64px;
      position: relative;
      overflow: hidden;
    }

    .deco-top {
      position: absolute; top: 0; left: 0; right: 0; height: 280px;
      background: linear-gradient(180deg, #F9E4EF 0%, #FDF6F9 100%);
      pointer-events: none; z-index: 0;
    }
    .deco-c1 {
      position: absolute; width: 200px; height: 200px; border-radius: 50%;
      background: #F5C6DC; opacity: 0.18;
      top: -50px; right: -60px; pointer-events: none; z-index: 0;
    }
    .deco-c2 {
      position: absolute; width: 130px; height: 130px; border-radius: 50%;
      background: #E8B4CC; opacity: 0.13;
      top: 210px; left: -40px; pointer-events: none; z-index: 0;
    }
    .petal {
      position: absolute; pointer-events: none; z-index: 0;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      opacity: 0.22;
      animation: drift 6s ease-in-out infinite;
    }
    @keyframes drift {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(20deg); }
    }

    .content {
      position: relative; z-index: 1;
      width: 100%; max-width: 360px;
      display: flex; flex-direction: column; align-items: center;
    }

    .avatar-frame {
      width: 114px; height: 114px; border-radius: 50%;
      border: 3.5px solid #F0B8D0;
      padding: 3px; background: white;
      margin-bottom: 20px;
      box-shadow: 0 6px 28px rgba(224, 152, 188, 0.25);
    }
    .avatar-frame img {
      width: 100%; height: 100%; border-radius: 50%;
      object-fit: cover; object-position: center top;
      display: block;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px; font-weight: 400; font-style: italic;
      color: #7A4A5E; letter-spacing: 0.4px;
      margin-bottom: 5px; text-align: center;
    }
    .handle {
      font-size: 13px; font-weight: 300;
      color: #C49AB0; letter-spacing: 1.6px;
      margin-bottom: 16px;
    }
    .bio {
      font-size: 13.5px; color: #B07A94; font-weight: 300;
      text-align: center; line-height: 1.9;
      margin-bottom: 28px;
    }
    .bio .dot { color: #E0B0C8; margin: 0 4px; }

    .divider {
      width: 44px; height: 1px;
      background: linear-gradient(to right, transparent, #E8C0D4, transparent);
      margin-bottom: 28px;
    }

    .section-label {
      font-size: 11px; font-weight: 500; letter-spacing: 2.5px;
      color: #CCA8BC; text-transform: uppercase;
      margin-bottom: 16px;
    }

    .links {
      display: flex; flex-direction: column;
      gap: 12px; width: 100%;
    }

    .link-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 15px 20px; border-radius: 18px;
      text-decoration: none;
      background: white;
      border: 1px solid #F0D8E6;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      box-shadow: 0 2px 12px rgba(224, 176, 200, 0.1);
    }
    .link-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(224, 152, 188, 0.22);
      border-color: #E0C0D4;
    }
    .link-btn:active { transform: translateY(0) scale(0.99); }

    .link-icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-ig { background: linear-gradient(135deg, #FCE4EF, #F9C8DF); }
    .icon-fb { background: #EEF0FC; }
    .icon-tt { background: #F4F4F4; }

    .link-icon svg { width: 20px; height: 20px; }

    .link-info { flex: 1; }
    .link-name { display: block; font-size: 14px; font-weight: 500; color: #6A3A52; }
    .link-sub { display: block; font-size: 12px; color: #C4A0B4; font-weight: 300; margin-top: 2px; }

    .link-arrow { color: #DDACC4; font-size: 18px; font-weight: 300; }

    .footer {
      margin-top: 44px;
      font-size: 11.5px; color: #D4AABF; font-weight: 300;
      letter-spacing: 0.8px; text-align: center;
    }
  </style>
</head>
